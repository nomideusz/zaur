resolver 127.0.0.11 valid=10s;

server {
	listen 80;
	client_max_body_size 256M;

	set $upstream http://srv-captain--auth:3002;

	location / {
		proxy_pass $upstream;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		# CapRover terminates TLS; upstream to this container is HTTP. Logto requires https.
		proxy_set_header X-Forwarded-Proto https;

		# Logto welcome SSR uses inline logtoSsr; production CSP omits unsafe-inline.
		proxy_hide_header Content-Security-Policy;
		add_header Content-Security-Policy "img-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net/ blob:; script-src-elem 'self' 'unsafe-inline' https://cdn.jsdelivr.net/ blob:; connect-src 'self' https://*.logto.io https://auth-admin.zaur.app https://auth.zaur.app; frame-src 'self' https://auth-admin.zaur.app https://auth.zaur.app; default-src 'self'; font-src 'self' https: data:; style-src 'self' https: 'unsafe-inline'; form-action 'self'; base-uri 'self'; object-src 'none';" always;
	}
}
