<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account created — New Internet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="logo-shield"><path d="M466.5 83.7l-192-80a48.15 48.15 0 0 0-36.9 0l-192 80C27.7 91.1 16 108.6 16 128c0 198.5 114.5 335.7 221.5 380.3 11.8 4.9 25.1 4.9 36.9 0C360.1 472.6 496 349.3 496 128c0-19.4-11.7-36.9-29.5-44.3zM262.2 478.8c-4 1.6-8.4 1.6-12.3 0C152 440 48 304 48 128c0-6.5 3.9-12.3 9.8-14.8l192-80c3.9-1.6 8.4-1.6 12.3 0l192 80c6 2.5 9.9 8.3 9.8 14.8.1 176-103.9 312-201.7 350.8zm136.2-325c-4.7-4.7-12.3-4.7-17-.1L218 315.8l-69-69.5c-4.7-4.7-12.3-4.7-17-.1l-8.5 8.5c-4.7 4.7-4.7 12.3-.1 17l85.9 86.6c4.7 4.7 12.3 4.7 17 .1l180.5-179c4.7-4.7 4.7-12.3.1-17z" /></svg>
        <span>newinternet</span>
      </a>
      <nav class="nav-links">
        <a href="/">Home</a>
      </nav>
    </div>
  </header>

  <main class="success-page">
    <div class="container">
      <div class="success-icon">✓</div>
      <h1>Welcome aboard!</h1>
      <p>Your new email address is ready:</p>
      <p class="success-email" id="success-email">—</p>

      <div class="settings-card">
        <h2>Mail client settings</h2>
        <table class="settings-table">
          <tr>
            <td>Webmail</td>
            <td><a href="#" id="webmail-url" target="_blank" rel="noopener">—</a></td>
          </tr>
          <tr>
            <td>IMAP server</td>
            <td id="imap-host">—</td>
          </tr>
          <tr>
            <td>IMAP port</td>
            <td>993 (SSL/TLS)</td>
          </tr>
          <tr>
            <td>SMTP server</td>
            <td id="smtp-host">—</td>
          </tr>
          <tr>
            <td>SMTP port</td>
            <td>465 (SSL/TLS) or 587 (STARTTLS)</td>
          </tr>
          <tr>
            <td>Username</td>
            <td id="settings-username">—</td>
          </tr>
          <tr>
            <td>Password</td>
            <td>Your chosen password</td>
          </tr>
        </table>
      </div>

      <div class="success-actions">
        <a href="#" id="webmail-btn" class="btn btn-primary" target="_blank" rel="noopener">Open webmail</a>
        <a href="/" class="btn btn-ghost">Back to home</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>&copy; 2026 New Internet</span>
    </div>
  </footer>

  <script>
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const email = params.get('email') || sessionStorage.getItem('registeredEmail') || '—';

      document.getElementById('success-email').textContent = email;
      document.getElementById('settings-username').textContent = email;

      try {
        const res = await fetch('/api/config');
        const config = await res.json();
        const webmailUrl = config.webmailUrl;
        const mailHost = config.mailHost;

        document.getElementById('webmail-url').href = webmailUrl;
        document.getElementById('webmail-url').textContent = webmailUrl;
        document.getElementById('webmail-btn').href = webmailUrl;
        document.getElementById('imap-host').textContent = mailHost;
        document.getElementById('smtp-host').textContent = mailHost;
      } catch {
        /* defaults already shown as — */
      }
    }

    init();
  </script>
</body>
</html>
