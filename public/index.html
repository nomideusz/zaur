<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>newinternet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="logo-shield"><path d="M466.5 83.7l-192-80a48.15 48.15 0 0 0-36.9 0l-192 80C27.7 91.1 16 108.6 16 128c0 198.5 114.5 335.7 221.5 380.3 11.8 4.9 25.1 4.9 36.9 0C360.1 472.6 496 349.3 496 128c0-19.4-11.7-36.9-29.5-44.3zM262.2 478.8c-4 1.6-8.4 1.6-12.3 0C152 440 48 304 48 128c0-6.5 3.9-12.3 9.8-14.8l192-80c3.9-1.6 8.4-1.6 12.3 0l192 80c6 2.5 9.9 8.3 9.8 14.8.1 176-103.9 312-201.7 350.8zm136.2-325c-4.7-4.7-12.3-4.7-17-.1L218 315.8l-69-69.5c-4.7-4.7-12.3-4.7-17-.1l-8.5 8.5c-4.7 4.7-4.7 12.3-.1 17l85.9 86.6c4.7 4.7 12.3 4.7 17 .1l180.5-179c4.7-4.7 4.7-12.3.1-17z" /></svg>
        <span>newinternet</span>
      </a>
      <nav class="nav-links">
        <a href="#" id="webmail-link" target="_blank" rel="noopener">Webmail</a>
      </nav>
    </div>
  </header>

  <main class="home-page">
    <div class="container">
      <div class="search-box">
        <input
          type="text"
          id="username-input"
          class="search-input"
          placeholder="Search usernames"
          autocomplete="off"
          spellcheck="false"
          autofocus
        >
        <div class="validation-hint" id="validation-hint"></div>
      </div>

      <div id="results-container"></div>

      <div class="register-panel" id="register-panel">
        <h2 id="selected-email-label">Create account</h2>
        <div class="notification error" id="form-error" role="alert"></div>

        <form id="register-form">
          <input type="hidden" id="selected-domain-id" name="domainId">

          <div class="form-group">
            <label for="invite-code">Invitation Code</label>
            <input type="text" id="invite-code" name="inviteCode" placeholder="zaur-XXXX-XXXX-XXXX" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required>
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <div class="strength-label" id="strength-label"></div>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm password</label>
            <input type="password" id="confirm-password" name="confirmPassword" autocomplete="new-password" required>
          </div>

          <div class="form-group">
            <label for="captcha-answer">Security check</label>
            <div class="captcha-row">
              <span class="captcha-question" id="captcha-question">Loading…</span>
              <input type="number" id="captcha-answer" name="captchaAnswer" inputmode="numeric" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%">Create account</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>&copy; 2026</span>
      <div class="footer-links">
        <a href="#" id="footer-webmail-link" target="_blank" rel="noopener">Webmail</a>
      </div>
    </div>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
