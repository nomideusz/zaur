<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Zaur Mail — offline</title>
		<style>
			body {
				font-family: system-ui, sans-serif;
				display: grid;
				place-items: center;
				min-height: 100dvh;
				margin: 0;
				background: #111;
				color: #eee;
				text-align: center;
			}
			button {
				margin-top: 1rem;
				padding: 0.6rem 1.4rem;
				font-size: 1rem;
				border-radius: 0.5rem;
				border: 1px solid #555;
				background: #222;
				color: #eee;
			}
		</style>
	</head>
	<body>
		<div>
			<h1>You're offline</h1>
			<p>Zaur Mail couldn't be reached. Check your connection.</p>
			<button onclick="location.href='https://webmail.zaur.app'">Retry</button>
		</div>
	</body>
</html>
