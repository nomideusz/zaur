  <main class="success-page">
    <div class="container">
      <div class="success-icon" aria-hidden="true">✓</div>
      <h1>Welcome aboard</h1>
      <p class="success-lead">Your new email address is ready:</p>
      <p class="success-email" id="success-email">—</p>

      <div class="settings-card z-panel">
        <h2>Mail client settings</h2>
        <table class="settings-table">
          <tr>
            <td>Webmail</td>
            <td><a href="#" id="webmail-url" target="_blank" rel="noopener">—</a></td>
          </tr>
          <tr>
            <td>IMAP server</td>
            <td id="imap-host">—</td>
          </tr>
          <tr>
            <td>IMAP port</td>
            <td>993 (SSL/TLS)</td>
          </tr>
          <tr>
            <td>SMTP server</td>
            <td id="smtp-host">—</td>
          </tr>
          <tr>
            <td>SMTP port</td>
            <td>465 (SSL/TLS) or 587 (STARTTLS)</td>
          </tr>
          <tr>
            <td>Username</td>
            <td id="settings-username">—</td>
          </tr>
          <tr>
            <td>Password</td>
            <td>Your chosen password</td>
          </tr>
        </table>
      </div>

      <div class="success-actions">
        <a href="#" id="webmail-btn" class="btn btn-primary" target="_blank" rel="noopener">Open mail</a>
        <a href="/" class="btn btn-ghost">Back to domains</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>&copy; 2026 ZAUR</span>
    </div>
  </footer>

  <script>
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const email = params.get('email') || sessionStorage.getItem('registeredEmail') || '—';

      document.getElementById('success-email').textContent = email;
      document.getElementById('settings-username').textContent = email;

      try {
        const res = await fetch('/api/config');
        const config = await res.json();
        const webmailUrl = config.webmailUrl;
        const mailHost = config.mailHost;

        document.getElementById('webmail-url').href = webmailUrl;
        document.getElementById('webmail-url').textContent = webmailUrl;
        document.getElementById('webmail-btn').href = webmailUrl;
        document.getElementById('header-webmail-link').href = webmailUrl;
        document.getElementById('imap-host').textContent = mailHost;
        document.getElementById('smtp-host').textContent = mailHost;
      } catch {
        /* defaults remain — */
      }
    }

    init();
  </script>
