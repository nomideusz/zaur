<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Fast, offline-capable webmail for ZAUR accounts." />
		<meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0f1419" media="(prefers-color-scheme: dark)" />
		<meta name="text-scale" content="scale" />
		<script>
			(function () {
				try {
					var theme = localStorage.getItem('zaur-theme');
					var dark =
						theme === 'dark' ||
						(theme !== 'light' &&
							window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (dark) document.documentElement.classList.add('dark');
					var accent = localStorage.getItem('zaur:accent-color');
					if (accent) document.documentElement.dataset.accent = accent;

					var listText = localStorage.getItem('zaur:list-text-size');
					if (listText === 'large') {
						document.documentElement.style.setProperty('--z-list-text', '1.125rem');
					} else if (listText === 'small') {
						document.documentElement.style.setProperty('--z-list-text', '1rem');
					}
					var readerText = localStorage.getItem('zaur:reader-text-size');
					if (readerText === 'large') {
						document.documentElement.style.setProperty('--z-reader-text', '1.1875rem');
					} else if (readerText === 'small') {
						document.documentElement.style.setProperty('--z-reader-text', '1rem');
					}
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
