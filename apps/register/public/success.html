<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account created · ZAUR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tachyons.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="sans-serif bg-near-white near-black min-h-100 flex flex-column">
  <header class="site-header bg-white bb b--light-gray sticky top-0 z-5">
    <div class="container flex items-center justify-between h-100 g3">
      <a href="/" class="logo flex items-center g2 near-black no-underline">
        <span>ZAUR</span>
      </a>
      <nav class="flex items-center g1" aria-label="Tools">
        <a href="/" class="tool-link is-active bg-near-white near-black fw5 f6 pv2 ph3 br2 no-underline">Register</a>
        <a href="#" id="header-webmail-link" class="tool-link mid-gray hover-near-black f6 pv2 ph3 br2 no-underline" target="_blank" rel="noopener">Mail</a>
      </nav>
    </div>
  </header>

  <main class="flex-auto pv4 pv5-ns tc">
    <div class="container">
      <div class="success-icon br-100 bg-washed-green green flex items-center justify-center center f3 fw7 mb3" style="width: 4rem; height: 4rem;" aria-hidden="true">✓</div>
      <h1 class="f3 f2-ns fw6 tracking-tight near-black mb2 mt0">Welcome aboard</h1>
      <p class="f5 mid-gray mt0 success-lead">Your new email address is ready:</p>
      <p class="f4 f3-ns fw6 blue mt2 mb4 success-email" id="success-email">—</p>

      <div class="settings-card bg-white ba b--light-gray br3 shadow-1 pa4 mb4 mw7 center tl">
        <h2 class="f5 fw6 near-black mt0 mb3 pb2 bb b--light-gray">Mail client settings</h2>
        <table class="settings-table w-100 collapse f6">
          <tr class="bb b--light-gray">
            <td class="pv2 gray w-40">Webmail</td>
            <td class="pv2"><a href="#" id="webmail-url" class="blue hover-dark-blue no-underline" target="_blank" rel="noopener">—</a></td>
          </tr>
          <tr class="bb b--light-gray">
            <td class="pv2 gray">IMAP server</td>
            <td class="pv2 near-black" id="imap-host">—</td>
          </tr>
          <tr class="bb b--light-gray">
            <td class="pv2 gray">IMAP port</td>
            <td class="pv2 near-black">993 (SSL/TLS)</td>
          </tr>
          <tr class="bb b--light-gray">
            <td class="pv2 gray">SMTP server</td>
            <td class="pv2 near-black" id="smtp-host">—</td>
          </tr>
          <tr class="bb b--light-gray">
            <td class="pv2 gray">SMTP port</td>
            <td class="pv2 near-black">465 (SSL/TLS) or 587 (STARTTLS)</td>
          </tr>
          <tr class="bb b--light-gray">
            <td class="pv2 gray">Username</td>
            <td class="pv2 near-black" id="settings-username">—</td>
          </tr>
          <tr>
            <td class="pv2 gray">Password</td>
            <td class="pv2 near-black">Your chosen password</td>
          </tr>
        </table>
      </div>

      <div class="success-actions flex justify-center g3 mt4">
        <a href="#" id="webmail-btn" class="btn btn-primary bg-blue white hover-bg-dark-blue f6 pv2 ph3 br2 fw5 bn pointer no-underline" target="_blank" rel="noopener">Open mail</a>
        <a href="/" class="btn btn-ghost bg-near-white hover-bg-light-gray mid-gray hover-near-black f6 pv2 ph3 br2 ba b--light-gray pointer no-underline">Back to register</a>
      </div>
    </div>
  </main>

  <footer class="site-footer bg-white bt b--light-gray pv3 mt-auto">
    <div class="container flex flex-column flex-row-m items-start items-center-m justify-between-m g2 g0-m">
      <span class="gray f7">&copy; 2026 ZAUR</span>
    </div>
  </footer>

  <script>
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const email = params.get('email') || sessionStorage.getItem('registeredEmail') || '—';

      document.getElementById('success-email').textContent = email;
      document.getElementById('settings-username').textContent = email;

      try {
        const res = await fetch('/api/config');
        const config = await res.json();
        const webmailUrl = config.webmailUrl;
        const mailHost = config.mailHost;

        document.getElementById('webmail-url').href = webmailUrl;
        document.getElementById('webmail-url').textContent = webmailUrl;
        document.getElementById('webmail-btn').href = webmailUrl;
        document.getElementById('header-webmail-link').href = webmailUrl;
        document.getElementById('imap-host').textContent = mailHost;
        document.getElementById('smtp-host').textContent = mailHost;
      } catch {
        /* defaults remain — */
      }
    }

    init();
  </script>
</body>
</html>
