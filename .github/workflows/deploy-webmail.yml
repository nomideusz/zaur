name: Deploy webmail to CapRover

on:
  push:
    branches: [main]
    paths:
      - 'apps/webmail/**'
      - 'packages/sprite/**'
      - 'packages/ui/**'
      - 'packages/svelte-calendar/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.npmrc'
      - 'infra/deploy/webmail.captain-definition'
      - '.github/workflows/deploy-webmail.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @zaur/webmail...

      - name: Build workspace packages
        run: pnpm --filter @nomideusz/svelte-calendar package

      - name: Type check
        run: pnpm --filter @zaur/webmail check

      - name: Unit tests
        run: pnpm --filter @zaur/webmail test

      - name: Prepare captain-definition
        run: cp infra/deploy/webmail.captain-definition captain-definition

      - name: Create deployment tarball
        uses: a7ul/tar-action@v1.1.0
        with:
          command: c
          cwd: ./
          files: |
            captain-definition
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json
            .npmrc
            packages/ui/
            packages/sprite/
            packages/svelte-calendar/
            apps/webmail/
          outPath: deploy.tar

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: https://captain.zaur.app
          app: webmail
          token: ${{ secrets.CAPROVER_WEBMAIL_TOKEN }}
