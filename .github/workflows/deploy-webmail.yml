name: Webmail CI

# Deployment is owned by Dokploy (git auto-deploy builds apps/webmail/Dockerfile
# on push to main). This workflow is the pre-deploy gate: typecheck + unit tests.

on:
  push:
    branches: [main]
    paths:
      - 'apps/webmail/**'
      - 'packages/sprite/**'
      - 'packages/ui/**'
      - 'packages/svelte-calendar/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.npmrc'
      - '.github/workflows/deploy-webmail.yml'
  pull_request:
    paths:
      - 'apps/webmail/**'
      - 'packages/sprite/**'
      - 'packages/ui/**'
      - 'packages/svelte-calendar/**'
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @zaur/webmail...

      - name: Build workspace packages
        run: pnpm --filter @nomideusz/svelte-calendar package

      - name: Type check
        run: pnpm --filter @zaur/webmail check

      - name: Unit tests
        run: pnpm --filter @zaur/webmail test
