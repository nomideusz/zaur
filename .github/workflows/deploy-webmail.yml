name: Webmail CI

# Deployment is owned by Dokploy (git auto-deploy builds apps/webmail/Dockerfile
# on push to main). This workflow is the pre-deploy quality gate.

on:
  push:
    branches: [main]
    paths:
      - 'apps/webmail/**'
      - 'packages/sprite/**'
      - 'packages/ui/**'
      - 'packages/svelte-calendar/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.npmrc'
      - '.github/workflows/deploy-webmail.yml'
  pull_request:
    paths:
      - 'apps/webmail/**'
      - 'packages/sprite/**'
      - 'packages/ui/**'
      - 'packages/svelte-calendar/**'
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @zaur/webmail...

      - name: Build workspace packages
        run: pnpm --filter @nomideusz/svelte-calendar package

      - name: Type check
        run: pnpm --filter @zaur/webmail check

      - name: Unit tests
        run: pnpm --filter @zaur/webmail test

      - name: Production build
        run: pnpm --filter @zaur/webmail build

      - name: Install Playwright Chromium
        run: pnpm --filter @zaur/webmail exec playwright install --with-deps chromium

      - name: Component smoke tests
        run: pnpm --filter @zaur/webmail test:e2e:labs

      - name: Authenticated Stalwart smoke tests
        if: github.event_name != 'pull_request'
        env:
          E2E_MAIL_EMAIL: ${{ secrets.E2E_MAIL_EMAIL }}
          E2E_MAIL_PASSWORD: ${{ secrets.E2E_MAIL_PASSWORD }}
          STALWART_OAUTH_ENABLED: 'true'
          STALWART_OAUTH_ISSUER_URL: https://mail.zaur.app
          STALWART_OAUTH_CLIENT_ID: zaur-webmail-prod
          STALWART_OAUTH_REDIRECT_URI: https://webmail.zaur.app/api/auth/oauth/callback
        run: |
          if [ -z "$E2E_MAIL_EMAIL" ] || [ -z "$E2E_MAIL_PASSWORD" ]; then
            echo "::warning::E2E_MAIL_EMAIL/E2E_MAIL_PASSWORD secrets not configured — skipping authenticated smoke tests"
            exit 0
          fi
          SESSION_SECRET=$(openssl rand -base64 32) pnpm --filter @zaur/webmail test:e2e:auth
