name: Deploy register to CapRover

on:
  push:
    branches: [main]
    paths:
      - 'apps/register/**'
      - 'packages/ui/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.npmrc'
      - 'infra/deploy/register.captain-definition'
      - '.github/workflows/deploy-register.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace deps for CSS build
        run: pnpm install --frozen-lockfile --filter @zaur/ui...

      - name: Build register CSS
        run: pnpm --filter @zaur/ui build:css

      - name: Create deployment tarball
        run: |
          tar -cf deploy.tar \
            --exclude=node_modules \
            --exclude=.data \
            --exclude=test-results \
            --exclude=playwright-report \
            -C apps/register .

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: https://captain.zaur.app
          app: register
          token: ${{ secrets.CAPROVER_REGISTER_TOKEN }}
